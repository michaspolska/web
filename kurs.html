<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Szyfrowany Notatnik</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>

  <style>
    :root {
      --bg-page: #f3f4f6;
      --bg-card: #ffffff;
      --border: #e5e7eb;
      --text-main: #111827;
      --text-muted: #6b7280;
      --accent: #f97316;
      --accent-dark: #ea580c;
      --accent-soft: #ffedd5;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 1rem 2rem;
      background: var(--bg-page);
      color: var(--text-main);
    }

    /* Górny pasek */
    #main-bar {
      background: #ffffff;
      margin: 1rem -1rem 1.5rem;
      padding: 0.75rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
      border-bottom: 1px solid var(--border);
      box-shadow: 0 2px 4px rgba(15, 23, 42, 0.06);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    #app-title {
      font-weight: 600;
      font-size: 1rem;
      color: var(--text-main);
    }

    #app-subtitle {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    #main-bar-left {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    #main-bar-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    #search-input {
      padding: 0.4rem 0.6rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      min-width: 180px;
      max-width: 260px;
      background: #f9fafb;
      color: var(--text-main);
      font-size: 0.85rem;
      display: none; /* tylko po zalogowaniu */
    }

    #search-input::placeholder {
      color: #9ca3af;
    }

    #top-auth-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.78rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    #top-user-email {
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #top-auth-button {
      padding: 0.35rem 0.8rem;
      border-radius: 999px;
      background: var(--accent);
      color: #ffffff;
      border: none;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
      box-shadow: 0 1px 2px rgba(248, 113, 22, 0.4);
    }

    #top-auth-button:hover {
      background: var(--accent-dark);
    }

    /* Przycisk Wróć (w menu) */
    #top-back-button {
      display: none;
      padding: 0.4rem 0.8rem;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-dark);
      border: 1px solid var(--accent);
      font-size: 0.82rem;
      cursor: pointer;
      white-space: nowrap;
    }

    /* Logowanie */
    .login-box {
      border: 1px solid var(--border);
      padding: 1.5rem;
      border-radius: 12px;
      max-width: 420px;
      margin: 0 auto;
      background: var(--bg-card);
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
    }

    .login-box h3 {
      margin-top: 0;
      margin-bottom: 0.5rem;
      font-size: 1rem;
    }

    .login-box p {
      margin-top: 0;
      margin-bottom: 1rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      margin-bottom: 0.75rem;
      padding: 0.6rem 0.7rem;
      box-sizing: border-box;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #f9fafb;
      color: var(--text-main);
      font-size: 0.9rem;
    }

    input::placeholder {
      color: #9ca3af;
    }

    button {
      padding: 0.6rem 1rem;
      background: var(--accent);
      color: #ffffff;
      cursor: pointer;
      border: none;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 500;
    }

    #login-btn {
      width: 100%;
      margin-top: 0.5rem;
    }

    /* Widok po zalogowaniu – domyślnie ukryty */
    #app {
      display: none;
      margin-top: 1.5rem;
      grid-template-columns: minmax(0, 320px) minmax(0, 1fr);
      gap: 1rem;
    }

    #notes-list {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg-card);
      padding: 0.75rem 0.5rem 0.5rem;
    }

    #notes-list p {
      margin: 0 0 0.5rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      padding: 0 0.5rem;
    }

    #notes-list ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    #notes-list li {
      padding: 0.45rem 0.6rem;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    #notes-list li:hover {
      background: var(--accent-soft);
    }

    .note-title {
      font-weight: 500;
      font-size: 0.9rem;
      color: var(--text-main);
    }

    .note-meta {
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    #content {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg-card);
      padding: 1rem 1.2rem;
      min-height: 200px;
      max-height: calc(100vh - 220px);
      overflow: auto;
      font-size: 0.9rem;
      color: var(--text-main);
    }

    #content em {
      color: var(--text-muted);
    }

    /* Markdown / kod */
    #content h1, #content h2, #content h3 {
      margin-top: 1rem;
      margin-bottom: 0.4rem;
    }
    #content p {
      margin: 0.3rem 0;
    }
    #content ul {
      padding-left: 1.1rem;
    }

    #content code {
      background: #fee2e2;
      color: #7c2d12;
      padding: 0.15rem 0.25rem;
      border-radius: 4px;
      font-size: 0.85rem;
    }

    #content pre {
      background: #111827;
      color: #f9fafb;
      padding: 0.75rem 0.9rem;
      border-radius: 8px;
      overflow: auto;
      font-size: 0.85rem;
      line-height: 1.4;
    }

    #content pre code {
      background: transparent;
      color: inherit;
      padding: 0;
    }

    /* Tablet */
    @media (max-width: 768px) {
      #main-bar {
        flex-direction: column;
        align-items: stretch;
      }

      #main-bar-left {
        margin-bottom: 0.25rem;
      }

      #main-bar-right {
        flex-direction: column;
        align-items: stretch;
        gap: 0.4rem;
      }

      #search-input {
        flex: 1;
        max-width: none;
        border-radius: 999px;
      }

      #app {
        grid-template-columns: minmax(0, 1fr);
      }

      #content {
        max-height: none;
      }

      #top-back-button,
      #top-auth-button {
        width: 100%;
        text-align: center;
        border-radius: 999px;
      }

      #top-auth-info {
        flex-direction: column;
        align-items: stretch;
        gap: 0.15rem;
      }

      #top-user-email {
        max-width: none;
        white-space: normal;
        overflow: visible;
        text-overflow: clip;
      }
    }

    /* Telefon – ciaśniejsze odstępy */
    @media (max-width: 480px) {
      #main-bar {
        margin: 0 -1rem 1rem;
        padding: 0.6rem 0.75rem;
      }

      #app-title {
        font-size: 0.95rem;
      }

      #app-subtitle {
        font-size: 0.7rem;
      }

      #main-bar-right {
        gap: 0.35rem;
      }

      #top-back-button {
        font-size: 0.8rem;
        padding: 0.35rem 0.6rem;
      }

      #search-input {
        font-size: 0.8rem;
        padding: 0.35rem 0.55rem;
      }

      #top-auth-button {
        font-size: 0.8rem;
        padding: 0.4rem 0.6rem;
      }
    }
  </style>
</head>
<body>

  <div id="main-bar">
    <div id="main-bar-left">
      <div id="app-title">Szyfrowany Notatnik</div>
      <div id="app-subtitle">Supabase + AES szyfrowanie po stronie przeglądarki</div>
    </div>
    <div id="main-bar-right">
      <button id="top-back-button">← Lista notatek</button>
      <input id="search-input" type="text" placeholder="Szukaj notatek po tytule..." />
      <div id="top-auth-info">
        <span id="top-user-email">Niezalogowany</span>
        <button id="top-auth-button">Zaloguj</button>
      </div>
    </div>
  </div>

  <div id="login-container" class="login-box">
    <h3>Logowanie do bazy danych</h3>
    <p><small>Podaj dane logowania i klucz deszyfrowania pliku.</small></p>
    <input type="email" id="email" placeholder="E-mail w Supabase">
    <input type="password" id="password" placeholder="Hasło do Supabase">
    <input type="password" id="decrypt-key" placeholder="Klucz deszyfrowania (taki jak w skrypcie)">
    <button id="login-btn">Zaloguj</button>
  </div>

  <div id="app">
    <div id="notes-list">
      <p><small>Kliknij notatkę, aby ją odszyfrować wybranym kluczem.</small></p>
      <ul id="notes-ul"></ul>
    </div>
    <div id="content">
      <em>Wybierz notatkę z listy po lewej.</em>
    </div>
  </div>

  <script>
    const { createClient } = supabase;
    const SUPABASE_URL = 'https://yszpfcfbipplzjkicssw.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_eGRsjEs5pGvrTD_wucr1Hw_oIf8_0DO';

    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let CURRENT_DECRYPT_KEY = '';
    let NOTES_CACHE = [];
    let FILTERED_NOTES = [];
    let CURRENT_USER = null;

    const searchInput = document.getElementById('search-input');
    const notesListDiv = document.getElementById('notes-list');
    const contentDiv = document.getElementById('content');
    const backTopButton = document.getElementById('top-back-button');

    document.getElementById('login-btn').addEventListener('click', loginAndLoadNotes);
    document.getElementById('top-auth-button').addEventListener('click', topAuthButtonClick);
    searchInput.addEventListener('input', onSearchChange);
    backTopButton.addEventListener('click', showListOnMobile);

    function isMobile() {
      return window.innerWidth <= 480;
    }

    function showSearch() {
      searchInput.style.display = 'block';
    }

    function hideSearch() {
      searchInput.style.display = 'none';
      searchInput.value = '';
    }

    function showListOnMobile() {
      if (!isMobile()) return;
      notesListDiv.style.display = 'block';
      contentDiv.style.display = 'none';
      backTopButton.style.display = 'none';
    }

    function showContentOnMobile() {
      if (!isMobile()) return;
      notesListDiv.style.display = 'none';
      contentDiv.style.display = 'block';
      backTopButton.style.display = 'inline-block';
      contentDiv.scrollTop = 0;
    }

    async function loginAndLoadNotes() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const decryptionKey = document.getElementById('decrypt-key').value;

      if (!email || !password || !decryptionKey) {
        alert("Podaj email, hasło i klucz deszyfrowania.");
        return;
      }

      CURRENT_DECRYPT_KEY = decryptionKey;

      const { data: authData, error: authError } = await sb.auth.signInWithPassword({
        email,
        password
      });

      if (authError) {
        console.error(authError);
        alert("Błąd logowania: " + authError.message);
        return;
      }

      const { data: { user }, error: userError } = await sb.auth.getUser();

      if (userError || !user) {
        console.error(userError);
        alert("Nie udało się odczytać danych użytkownika.");
        return;
      }

      CURRENT_USER = user;
      updateTopBarAuthState();
      showSearch();

      const { data: notes, error: notesError } = await sb
        .from('notes')
        .select('id, encrypted_content, created_at')
        .order('created_at', { ascending: false });

      if (notesError) {
        console.error(notesError);
        alert("Błąd pobierania notatek: " + notesError.message);
        return;
      }

      // --- KLUCZOWA ZMIANA: filtrujemy tylko odszyfrowywalne notatki ---
      const decryptableNotes = (notes || []).filter(note => {
        const title = extractTitle(note.encrypted_content);
        return title !== null && title !== undefined && title !== '';
      });

      NOTES_CACHE = decryptableNotes;
      FILTERED_NOTES = decryptableNotes;

      document.getElementById('login-container').style.display = 'none';
      document.getElementById('app').style.display = 'grid';

      renderNotesList();

      if (isMobile()) {
        showListOnMobile();
      } else {
        notesListDiv.style.display = 'block';
        contentDiv.style.display = 'block';
        backTopButton.style.display = 'none';
      }
    }

    function updateTopBarAuthState() {
      const emailSpan = document.getElementById('top-user-email');
      const button = document.getElementById('top-auth-button');

      if (CURRENT_USER) {
        emailSpan.textContent = `Zalogowany jako: ${CURRENT_USER.email}`;
        button.textContent = 'Wyloguj';
      } else {
        emailSpan.textContent = 'Niezalogowany';
        button.textContent = 'Zaloguj';
      }
    }

    async function topAuthButtonClick() {
      if (CURRENT_USER) {
        await logoutUser();
      } else {
        document.getElementById('login-container').scrollIntoView({ behavior: 'smooth' });
        document.getElementById('email').focus();
      }
    }

    function extractTitle(encryptedString) {
      try {
        const bytes = CryptoJS.AES.decrypt(encryptedString, CURRENT_DECRYPT_KEY);
        const markdown = bytes.toString(CryptoJS.enc.Utf8);
        if (!markdown) return null;

        const lines = markdown.split(/\r?\n/);

        for (const line of lines) {
          const trimmed = line.trim();
          if (trimmed.startsWith('# ')) {
            return trimmed.replace(/^#\s*/, '').trim();
          }
        }

        for (const line of lines) {
          const trimmed = line.trim();
          if (trimmed.startsWith('## ')) {
            return trimmed.replace(/^##\s*/, '').trim();
          }
        }

        const firstNonEmpty = lines.find(l => l.trim().length > 0);
        return firstNonEmpty ? firstNonEmpty.trim().slice(0, 50) : null;
      } catch {
        return null;
      }
    }

    function renderNotesList() {
      const ul = document.getElementById('notes-ul');
      ul.innerHTML = '';

      // Dodatkowe zabezpieczenie – bierzemy tylko notatki z tytułem
      const visibleNotes = FILTERED_NOTES.map((note, index) => {
        const title = extractTitle(note.encrypted_content);
        return { note, index, title };
      }).filter(x => x.title);

      if (!visibleNotes.length) {
        ul.innerHTML = '<li><span class="note-meta">Brak notatek spełniających kryteria (lub niepasujący klucz).</span></li>';
        contentDiv.innerHTML = '<em>Brak danych do wyświetlenia.</em>';
        return;
      }

      visibleNotes.forEach(({ note, index, title }) => {
        const li = document.createElement('li');

        const date = new Date(note.created_at);
        const dateText = isNaN(date.getTime())
          ? '(brak daty)'
          : date.toLocaleString();

        li.innerHTML = `
          <span class="note-title">${title}</span>
          <span class="note-meta">${dateText} • id: ${note.id}</span>
        `;

        li.addEventListener('click', () => decryptAndShowNote(note));

        ul.appendChild(li);
      });
    }

    function decryptAndShowNote(note) {
      try {
        const encryptedString = note.encrypted_content;
        const decryptedBytes = CryptoJS.AES.decrypt(encryptedString, CURRENT_DECRYPT_KEY);
        const decryptedMarkdown = decryptedBytes.toString(CryptoJS.enc.Utf8);

        if (!decryptedMarkdown) {
          throw new Error("Nieprawidłowy klucz deszyfrowania lub uszkodzone dane.");
        }

        contentDiv.innerHTML = marked.parse(decryptedMarkdown);

        if (isMobile()) {
          showContentOnMobile();
        }

      } catch (err) {
        console.error(err);
        alert("Błąd deszyfrowania: " + err.message);
      }
    }

    function onSearchChange() {
      const q = searchInput.value.toLowerCase().trim();

      if (!q) {
        FILTERED_NOTES = NOTES_CACHE;
        renderNotesList();
        return;
      }

      FILTERED_NOTES = NOTES_CACHE.filter(note => {
        const title = extractTitle(note.encrypted_content);
        return title && title.toLowerCase().includes(q);
      });

      renderNotesList();
    }

    async function logoutUser() {
      try {
        await sb.auth.signOut();
      } catch (err) {
        console.error(err);
      }

      CURRENT_USER = null;
      CURRENT_DECRYPT_KEY = '';
      NOTES_CACHE = [];
      FILTERED_NOTES = [];
      updateTopBarAuthState();
      hideSearch();

      document.getElementById('notes-ul').innerHTML = '';
      contentDiv.innerHTML = '<em>Wybierz notatkę z listy po lewej.</em>';
      document.getElementById('email').value = '';
      document.getElementById('password').value = '';
      document.getElementById('decrypt-key').value = '';

      document.getElementById('app').style.display = 'none';
      document.getElementById('login-container').style.display = 'block';
      document.getElementById('login-container').scrollIntoView({ behavior: 'smooth' });
      backTopButton.style.display = 'none';
    }

    window.addEventListener('resize', () => {
      if (document.getElementById('app').style.display === 'grid') {
        if (isMobile()) {
          showListOnMobile();
        } else {
          notesListDiv.style.display = 'block';
          contentDiv.style.display = 'block';
          backTopButton.style.display = 'none';
        }
      }
    });
  </script>
</body>
</html>
