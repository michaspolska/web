<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Szyfrowany Notatnik</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>

  <style>
    :root {
      --bg: #0f172a;
      --bg-light: #111827;
      --accent: #38bdf8;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 1rem 2rem;
      background: #0b1120;
      color: #e5e7eb;
    }

    /* Górny pasek */
    #main-bar {
      background: var(--bg);
      margin: 1rem -1rem 1.5rem;
      padding: 0.75rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
      border-bottom: 1px solid #1f2937;
      box-shadow: 0 1px 0 rgba(15,23,42,0.7);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    #app-title {
      font-weight: 600;
      font-size: 1rem;
    }

    #app-subtitle {
      font-size: 0.75rem;
      color: var(--muted);
    }

    #main-bar-left {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    #main-bar-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    #search-input {
      padding: 0.4rem 0.6rem;
      border-radius: 999px;
      border: 1px solid #1f2937;
      min-width: 180px;
      max-width: 260px;
      background: var(--bg-light);
      color: var(--text);
      font-size: 0.85rem;
    }

    #search-input::placeholder {
      color: #6b7280;
    }

    #top-auth-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
    }

    #top-auth-button {
      padding: 0.35rem 0.8rem;
      border-radius: 999px;
      background: var(--accent);
      color: #020617;
      border: none;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
    }

    #top-auth-button:hover {
      filter: brightness(1.05);
    }

    /* Layout główny */
    .login-box {
      border: 1px solid #1f2937;
      padding: 1.5rem;
      border-radius: 12px;
      max-width: 420px;
      margin: 0 auto;
      background: var(--bg);
      box-shadow: 0 10px 30px rgba(15,23,42,0.45);
    }

    .login-box h3 {
      margin-top: 0;
      margin-bottom: 0.5rem;
      font-size: 1rem;
    }

    .login-box p {
      margin-top: 0;
      margin-bottom: 1rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      margin-bottom: 0.75rem;
      padding: 0.6rem 0.7rem;
      box-sizing: border-box;
      border-radius: 8px;
      border: 1px solid #1f2937;
      background: #020617;
      color: var(--text);
      font-size: 0.9rem;
    }

    input::placeholder {
      color: #6b7280;
    }

    button {
      padding: 0.6rem 1rem;
      background: var(--accent);
      color: #020617;
      cursor: pointer;
      border: none;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 500;
    }

    #login-btn {
      width: 100%;
      margin-top: 0.5rem;
    }

    #app {
      display: none;
      margin-top: 1.5rem;
      display: grid;
      grid-template-columns: minmax(0, 320px) minmax(0, 1fr);
      gap: 1rem;
    }

    #notes-list {
      border: 1px solid #1f2937;
      border-radius: 12px;
      background: var(--bg);
      padding: 0.75rem 0.5rem 0.5rem;
    }

    #notes-list p {
      margin: 0 0 0.5rem;
      font-size: 0.75rem;
      color: var(--muted);
      padding: 0 0.5rem;
    }

    #notes-list ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    #notes-list li {
      padding: 0.45rem 0.6rem;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    #notes-list li:hover {
      background: #111827;
    }

    .note-title {
      font-weight: 500;
      font-size: 0.9rem;
    }

    .note-meta {
      font-size: 0.72rem;
      color: var(--muted);
    }

    #content {
      border: 1px solid #1f2937;
      border-radius: 12px;
      background: var(--bg);
      padding: 1rem 1.2rem;
      min-height: 200px;
      max-height: calc(100vh - 220px);
      overflow: auto;
      font-size: 0.9rem;
    }

    #content em {
      color: var(--muted);
    }

    /* Markdown w treści */
    #content h1, #content h2, #content h3 {
      margin-top: 1rem;
      margin-bottom: 0.4rem;
    }
    #content p {
      margin: 0.3rem 0;
    }
    #content ul {
      padding-left: 1.1rem;
    }
    #content code {
      background: #020617;
      padding: 0.1rem 0.2rem;
      border-radius: 4px;
      font-size: 0.85rem;
    }
    #content pre {
      background: #020617;
      padding: 0.5rem 0.7rem;
      border-radius: 8px;
      overflow: auto;
    }

    /* Mobile */
    @media (max-width: 768px) {
      #main-bar {
        flex-direction: column;
        align-items: stretch;
      }
      #main-bar-left {
        margin-bottom: 0.3rem;
      }
      #main-bar-right {
        justify-content: space-between;
      }
      #search-input {
        flex: 1;
        max-width: none;
      }
      #app {
        grid-template-columns: minmax(0, 1fr);
      }
      #content {
        max-height: none;
      }
    }

    @media (max-width: 480px) {
      #main-bar-right {
        flex-direction: column;
        align-items: stretch;
      }
      #top-auth-info {
        align-items: stretch;
      }
      #top-auth-button {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <!-- Górny pasek (menu + search + login/logout) -->
  <div id="main-bar">
    <div id="main-bar-left">
      <div id="app-title">Szyfrowany Notatnik</div>
      <div id="app-subtitle">Supabase + AES szyfrowanie po stronie przeglądarki</div>
    </div>
    <div id="main-bar-right">
      <input id="search-input" type="text" placeholder="Szukaj notatek po tytule..." />
      <div id="top-auth-info">
        <span id="top-user-email">Niezalogowany</span>
        <button id="top-auth-button">Zaloguj</button>
      </div>
    </div>
  </div>

  <!-- Panel logowania -->
  <div id="login-container" class="login-box">
    <h3>Logowanie do bazy danych</h3>
    <p><small>Podaj dane logowania i klucz deszyfrowania pliku.</small></p>
    <input type="email" id="email" placeholder="E-mail w Supabase">
    <input type="password" id="password" placeholder="Hasło do Supabase">
    <input type="password" id="decrypt-key" placeholder="Klucz deszyfrowania (taki jak w skrypcie)">
    <button id="login-btn">Zaloguj</button>
  </div>

  <!-- Widok po zalogowaniu -->
  <div id="app">
    <div id="notes-list">
      <p><small>Kliknij notatkę, aby ją odszyfrować wybranym kluczem.</small></p>
      <ul id="notes-ul"></ul>
    </div>
    <div id="content">
      <em>Wybierz notatkę z listy po lewej.</em>
    </div>
  </div>

  <script>
    const { createClient } = supabase;
    const SUPABASE_URL = 'https://yszpfcfbipplzjkicssw.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_eGRsjEs5pGvrTD_wucr1Hw_oIf8_0DO';

    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let CURRENT_DECRYPT_KEY = '';
    let NOTES_CACHE = [];
    let FILTERED_NOTES = [];
    let CURRENT_USER = null;

    document.getElementById('login-btn').addEventListener('click', loginAndLoadNotes);
    document.getElementById('top-auth-button').addEventListener('click', topAuthButtonClick);
    document.getElementById('search-input').addEventListener('input', onSearchChange);

    async function loginAndLoadNotes() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const decryptionKey = document.getElementById('decrypt-key').value;

      if (!email || !password || !decryptionKey) {
        alert("Podaj email, hasło i klucz deszyfrowania.");
        return;
      }

      CURRENT_DECRYPT_KEY = decryptionKey;

      const { data: authData, error: authError } = await sb.auth.signInWithPassword({
        email,
        password
      });

      if (authError) {
        console.error(authError);
        alert("Błąd logowania: " + authError.message);
        return;
      }

      const {
        data: { user },
        error: userError
      } = await sb.auth.getUser();

      if (userError || !user) {
        console.error(userError);
        alert("Nie udało się odczytać danych użytkownika.");
        return;
      }

      CURRENT_USER = user;
      updateTopBarAuthState();

      const { data: notes, error: notesError } = await sb
        .from('notes')
        .select('id, encrypted_content, created_at')
        .order('created_at', { ascending: false });

      if (notesError) {
        console.error(notesError);
        alert("Błąd pobierania notatek: " + notesError.message);
        return;
      }

      NOTES_CACHE = notes || [];
      FILTERED_NOTES = NOTES_CACHE;

      document.getElementById('login-container').style.display = 'none';
      document.getElementById('app').style.display = 'grid';

      renderNotesList();
    }

    function updateTopBarAuthState() {
      const emailSpan = document.getElementById('top-user-email');
      const button = document.getElementById('top-auth-button');

      if (CURRENT_USER) {
        emailSpan.textContent = `Zalogowany jako: ${CURRENT_USER.email}`;
        button.textContent = 'Wyloguj';
      } else {
        emailSpan.textContent = 'Niezalogowany';
        button.textContent = 'Zaloguj';
      }
    }

    async function topAuthButtonClick() {
      if (CURRENT_USER) {
        await logoutUser();
      } else {
        document.getElementById('login-container').scrollIntoView({ behavior: 'smooth' });
        document.getElementById('email').focus();
      }
    }

    // Tytuł z linii "# Tytul"
    function extractTitle(encryptedString) {
      try {
        const bytes = CryptoJS.AES.decrypt(encryptedString, CURRENT_DECRYPT_KEY);
        const markdown = bytes.toString(CryptoJS.enc.Utf8);
        if (!markdown) return null;

        const lines = markdown.split(/\r?\n/);

        for (const line of lines) {
          const trimmed = line.trim();
          if (trimmed.startsWith('# ')) {
            return trimmed.replace(/^#\s*/, '').trim();
          }
        }

        for (const line of lines) {
          const trimmed = line.trim();
          if (trimmed.startsWith('## ')) {
            return trimmed.replace(/^##\s*/, '').trim();
          }
        }

        const firstNonEmpty = lines.find(l => l.trim().length > 0);
        return firstNonEmpty ? firstNonEmpty.trim().slice(0, 50) : null;
      } catch {
        return null;
      }
    }

    function renderNotesList() {
      const ul = document.getElementById('notes-ul');
      ul.innerHTML = '';

      if (!FILTERED_NOTES.length) {
        ul.innerHTML = '<li><span class="note-meta">Brak notatek spełniających kryteria wyszukiwania.</span></li>';
        document.getElementById('content').innerHTML = '<em>Brak danych do wyświetlenia.</em>';
        return;
      }

      FILTERED_NOTES.forEach((note, index) => {
        const li = document.createElement('li');

        const date = new Date(note.created_at);
        const dateText = isNaN(date.getTime())
          ? '(brak daty)'
          : date.toLocaleString();

        const title = extractTitle(note.encrypted_content) || `Notatka ${index + 1}`;

        li.innerHTML = `
          <span class="note-title">${title}</span>
          <span class="note-meta">${dateText} • id: ${note.id}</span>
        `;

        li.addEventListener('click', () => decryptAndShowNote(note));

        ul.appendChild(li);
      });
    }

    function decryptAndShowNote(note) {
      try {
        const encryptedString = note.encrypted_content;
        const decryptedBytes = CryptoJS.AES.decrypt(encryptedString, CURRENT_DECRYPT_KEY);
        const decryptedMarkdown = decryptedBytes.toString(CryptoJS.enc.Utf8);

        if (!decryptedMarkdown) {
          throw new Error("Nieprawidłowy klucz deszyfrowania lub uszkodzone dane.");
        }

        const contentDiv = document.getElementById('content');
        contentDiv.innerHTML = marked.parse(decryptedMarkdown);
      } catch (err) {
        console.error(err);
        alert("Błąd deszyfrowania: " + err.message);
      }
    }

    function onSearchChange() {
      const q = document.getElementById('search-input').value.toLowerCase().trim();

      if (!q) {
        FILTERED_NOTES = NOTES_CACHE;
        renderNotesList();
        return;
      }

      FILTERED_NOTES = NOTES_CACHE.filter(note => {
        const title = extractTitle(note.encrypted_content);
        return title && title.toLowerCase().includes(q);
      });

      renderNotesList();
    }

    async function logoutUser() {
      try {
        await sb.auth.signOut();
      } catch (err) {
        console.error(err);
      }

      CURRENT_USER = null;
      CURRENT_DECRYPT_KEY = '';
      NOTES_CACHE = [];
      FILTERED_NOTES = [];
      updateTopBarAuthState();

      document.getElementById('notes-ul').innerHTML = '';
      document.getElementById('content').innerHTML = '<em>Wybierz notatkę z listy po lewej.</em>';
      document.getElementById('email').value = '';
      document.getElementById('password').value = '';
      document.getElementById('decrypt-key').value = '';
      document.getElementById('search-input').value = '';

      document.getElementById('app').style.display = 'none';
      document.getElementById('login-container').style.display = 'block';
      document.getElementById('login-container').scrollIntoView({ behavior: 'smooth' });
    }
  </script>
</body>
</html>
