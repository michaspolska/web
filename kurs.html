<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Szyfrowany Notatnik</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>

  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 1rem; }
    .login-box { border: 1px solid #ccc; padding: 1.5rem; border-radius: 8px; max-width: 400px; }
    input { width: 100%; margin-bottom: 1rem; padding: 0.5rem; box-sizing: border-box; }
    button { width: 100%; padding: 0.7rem; background: #2c3e50; color: white; cursor: pointer; border: none;}
    #content { display: none; margin-top: 2rem; padding: 1.5rem; background: #f8f9fa; border-radius: 8px; }
  </style>
</head>
<body>

  <div id="login-container" class="login-box">
    <h3>Logowanie do bazy danych</h3>
    <p><small>Podaj dane logowania i klucz deszyfrowania pliku.</small></p>
    <input type="email" id="email" placeholder="E-mail w Supabase">
    <input type="password" id="password" placeholder="Hasło do Supabase">
    <input type="password" id="decrypt-key" placeholder="Klucz deszyfrowania (ten sam co w skrypcie)">
    <button id="login-btn">Zaloguj i Odszyfruj</button>
  </div>

  <div id="content"></div>

  <script>
    const { createClient } = supabase;
    const SUPABASE_URL = 'https://yszpfcfbipplzjkicssw.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_eGRsjEs5pGvrTD_wucr1Hw_oIf8_0DO';

    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById('login-btn').addEventListener('click', loginAndFetch);

    async function loginAndFetch() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const decryptionKey = document.getElementById('decrypt-key').value;

      if (!email || !password || !decryptionKey) {
        alert("Podaj email, hasło i klucz deszyfrowania.");
        return;
      }

      // 1. Logowanie
      const { data: authData, error: authError } = await sb.auth.signInWithPassword({
        email,
        password
      });

      if (authError) {
        console.error(authError);
        alert("Błąd logowania: " + authError.message);
        return;
      }

      // 2. Pobranie ostatniej notatki
      const { data: notes, error: notesError } = await sb
        .from('notes')
        .select('encrypted_content')
        .order('created_at', { ascending: false })
        .limit(1);

      if (notesError) {
        console.error(notesError);
        alert("Błąd pobierania notatek: " + notesError.message);
        return;
      }

      if (!notes || notes.length === 0) {
        alert("Nie znaleziono notatek dla tego użytkownika.");
        return;
      }

      try {
        const encryptedString = notes[0].encrypted_content;
        const decryptedBytes = CryptoJS.AES.decrypt(encryptedString, decryptionKey);
        const decryptedMarkdown = decryptedBytes.toString(CryptoJS.enc.Utf8);

        if (!decryptedMarkdown) {
          throw new Error("Nieprawidłowy klucz deszyfrowania lub uszkodzone dane.");
        }

        document.getElementById('login-container').style.display = 'none';
        const contentDiv = document.getElementById('content');
        contentDiv.style.display = 'block';
        contentDiv.innerHTML = marked.parse(decryptedMarkdown);

      } catch (err) {
        console.error(err);
        alert("Błąd deszyfrowania: " + err.message);
      }
    }
  </script>
</body>
</html>
