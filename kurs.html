<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Szyfrowany Notatnik</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>

  <style>
    body { font-family: system-ui, sans-serif; max-width: 1000px; margin: 2rem auto; padding: 1rem; }

    /* Górny pasek */
    #main-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid #dee2e6;
    }
    #app-title { font-weight: 600; font-size: 1.1rem; }
    #app-subtitle { font-size: 0.8rem; color: #666; }

    #main-bar-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    #search-input {
      padding: 0.4rem 0.6rem;
      border-radius: 4px;
      border: 1px solid #ccc;
      min-width: 220px;
    }

    #top-auth-info {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      font-size: 0.8rem;
      color: #555;
    }

    .login-box { border: 1px solid #ccc; padding: 1.5rem; border-radius: 8px; max-width: 400px; }
    input { width: 100%; margin-bottom: 1rem; padding: 0.5rem; box-sizing: border-box; }
    button { padding: 0.6rem 1rem; background: #2c3e50; color: white; cursor: pointer; border: none;}
    #login-btn { width: 100%; margin-top: 0.5rem; }

    #app { display: none; margin-top: 1rem; }

    #notes-list { margin-bottom: 1.5rem; }
    #notes-list ul { list-style: none; padding: 0; margin: 0; }
    #notes-list li { padding: 0.4rem 0.6rem; border-bottom: 1px solid #eee; cursor: pointer; }
    #notes-list li:hover { background: #f1f3f5; }
    #content { padding: 1.5rem; background: #f8f9fa; border-radius: 8px; }
    .note-meta { font-size: 0.8rem; color: #555; }
    .note-title { font-weight: 600; }
  </style>
</head>
<body>

  <!-- Górny pasek (menu + search + informacje o logowaniu) -->
  <div id="main-bar">
    <div>
      <div id="app-title">Szyfrowany Notatnik</div>
      <div id="app-subtitle">Supabase + AES po stronie przeglądarki</div>
    </div>
    <div id="main-bar-right">
      <input id="search-input" type="text" placeholder="Szukaj notatek po tytule..." />
      <div id="top-auth-info">
        <span id="top-user-email">Niezalogowany</span>
        <button id="top-auth-button">Zaloguj</button>
      </div>
    </div>
  </div>

  <!-- Panel logowania -->
  <div id="login-container" class="login-box">
    <h3>Logowanie do bazy danych</h3>
    <p><small>Podaj dane logowania i klucz deszyfrowania pliku.</small></p>
    <input type="email" id="email" placeholder="E-mail w Supabase">
    <input type="password" id="password" placeholder="Hasło do Supabase">
    <input type="password" id="decrypt-key" placeholder="Klucz deszyfrowania (taki jak w skrypcie)">
    <button id="login-btn">Zaloguj</button>
  </div>

  <!-- Widok po zalogowaniu -->
  <div id="app">
    <div id="notes-list">
      <p class="note-meta"><small>Kliknij notatkę, aby ją odszyfrować wybranym kluczem.</small></p>
      <ul id="notes-ul"></ul>
    </div>
    <div id="content">
      <em>Wybierz notatkę z listy powyżej.</em>
    </div>
  </div>

  <script>
    const { createClient } = supabase;
    const SUPABASE_URL = 'https://yszpfcfbipplzjkicssw.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_eGRsjEs5pGvrTD_wucr1Hw_oIf8_0DO';

    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let CURRENT_DECRYPT_KEY = '';
    let NOTES_CACHE = [];
    let FILTERED_NOTES = [];
    let CURRENT_USER = null;

    // Zdarzenia
    document.getElementById('login-btn').addEventListener('click', loginAndLoadNotes);
    document.getElementById('top-auth-button').addEventListener('click', topAuthButtonClick);
    document.getElementById('search-input').addEventListener('input', onSearchChange);

    async function loginAndLoadNotes() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const decryptionKey = document.getElementById('decrypt-key').value;

      if (!email || !password || !decryptionKey) {
        alert("Podaj email, hasło i klucz deszyfrowania.");
        return;
      }

      CURRENT_DECRYPT_KEY = decryptionKey;

      const { data: authData, error: authError } = await sb.auth.signInWithPassword({
        email,
        password
      });

      if (authError) {
        console.error(authError);
        alert("Błąd logowania: " + authError.message);
        return;
      }

      const {
        data: { user },
        error: userError
      } = await sb.auth.getUser();

      if (userError || !user) {
        console.error(userError);
        alert("Nie udało się odczytać danych użytkownika.");
        return;
      }

      CURRENT_USER = user;
      updateTopBarAuthState();

      const { data: notes, error: notesError } = await sb
        .from('notes')
        .select('id, encrypted_content, created_at')
        .order('created_at', { ascending: false });

      if (notesError) {
        console.error(notesError);
        alert("Błąd pobierania notatek: " + notesError.message);
        return;
      }

      NOTES_CACHE = notes || [];
      FILTERED_NOTES = NOTES_CACHE;

      document.getElementById('login-container').style.display = 'none';
      document.getElementById('app').style.display = 'block';

      renderNotesList();
    }

    function updateTopBarAuthState() {
      const emailSpan = document.getElementById('top-user-email');
      const button = document.getElementById('top-auth-button');

      if (CURRENT_USER) {
        emailSpan.textContent = `Zalogowany jako: ${CURRENT_USER.email}`;
        button.textContent = 'Wyloguj';
      } else {
        emailSpan.textContent = 'Niezalogowany';
        button.textContent = 'Zaloguj';
      }
    }

    async function topAuthButtonClick() {
      if (CURRENT_USER) {
        // Wyloguj
        await logoutUser();
      } else {
        // Przewiń do formularza logowania
        document.getElementById('login-container').scrollIntoView({ behavior: 'smooth' });
        document.getElementById('email').focus();
      }
    }

    // Wyciąga tytuł z pierwszej linii "# Tytul"
    function extractTitle(encryptedString) {
      try {
        const bytes = CryptoJS.AES.decrypt(encryptedString, CURRENT_DECRYPT_KEY);
        const markdown = bytes.toString(CryptoJS.enc.Utf8);
        if (!markdown) return null;

        const lines = markdown.split(/\r?\n/);

        for (const line of lines) {
          const trimmed = line.trim();
          if (trimmed.startsWith('# ')) {
            return trimmed.replace(/^#\s*/, '').trim();
          }
        }

        for (const line of lines) {
          const trimmed = line.trim();
          if (trimmed.startsWith('## ')) {
            return trimmed.replace(/^##\s*/, '').trim();
          }
        }

        const firstNonEmpty = lines.find(l => l.trim().length > 0);
        return firstNonEmpty ? firstNonEmpty.trim().slice(0, 50) : null;

      } catch {
        return null;
      }
    }

    function renderNotesList() {
      const ul = document.getElementById('notes-ul');
      ul.innerHTML = '';

      if (!FILTERED_NOTES.length) {
        ul.innerHTML = '<li>Brak notatek spełniających kryteria wyszukiwania.</li>';
        document.getElementById('content').innerHTML = '<em>Brak danych do wyświetlenia.</em>';
        return;
      }

      FILTERED_NOTES.forEach((note, index) => {
        const li = document.createElement('li');

        const date = new Date(note.created_at);
        const dateText = isNaN(date.getTime())
          ? '(brak daty)'
          : date.toLocaleString();

        const title = extractTitle(note.encrypted_content) || `Notatka ${index + 1}`;

        li.innerHTML = `
          <span class="note-title">${title}</span>
          <span class="note-meta"> (${dateText}, id: ${note.id})</span>
        `;

        li.addEventListener('click', () => decryptAndShowNote(note));

        ul.appendChild(li);
      });
    }

    function decryptAndShowNote(note) {
      try {
        const encryptedString = note.encrypted_content;
        const decryptedBytes = CryptoJS.AES.decrypt(encryptedString, CURRENT_DECRYPT_KEY);
        const decryptedMarkdown = decryptedBytes.toString(CryptoJS.enc.Utf8);

        if (!decryptedMarkdown) {
          throw new Error("Nieprawidłowy klucz deszyfrowania lub uszkodzone dane.");
        }

        const contentDiv = document.getElementById('content');
        contentDiv.innerHTML = marked.parse(decryptedMarkdown);
      } catch (err) {
        console.error(err);
        alert("Błąd deszyfrowania: " + err.message);
      }
    }

    function onSearchChange() {
      const q = document.getElementById('search-input').value.toLowerCase().trim();

      if (!q) {
        FILTERED_NOTES = NOTES_CACHE;
        renderNotesList();
        return;
      }

      FILTERED_NOTES = NOTES_CACHE.filter(note => {
        const title = extractTitle(note.encrypted_content);
        return title && title.toLowerCase().includes(q);
      });

      renderNotesList();
    }

    async function logoutUser() {
      try {
        await sb.auth.signOut();
      } catch (err) {
        console.error(err);
      }

      CURRENT_USER = null;
      CURRENT_DECRYPT_KEY = '';
      NOTES_CACHE = [];
      FILTERED_NOTES = [];
      updateTopBarAuthState();

      document.getElementById('notes-ul').innerHTML = '';
      document.getElementById('content').innerHTML = '<em>Wybierz notatkę z listy powyżej.</em>';
      document.getElementById('email').value = '';
      document.getElementById('password').value = '';
      document.getElementById('decrypt-key').value = '';
      document.getElementById('search-input').value = '';

      document.getElementById('app').style.display = 'none';
      document.getElementById('login-container').style.display = 'block';
    }
  </script>
</body>
</html>
